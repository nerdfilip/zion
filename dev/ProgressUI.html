<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
      .header-container { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
      h2 { margin: 0; font-size: 18px; color: #1a73e8; }
      #timer { font-size: 14px; font-weight: bold; color: #555; background: #e8eaed; padding: 4px 10px; border-radius: 4px; }
      
      .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      #status-text { font-weight: bold; font-size: 14px; }
      .stop-btn { background-color: #d32f2f; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
      .stop-btn:hover { background-color: #b71c1c; }
      .stop-btn:disabled { background-color: #e0e0e0; color: #9e9e9e; cursor: not-allowed; }

      .progress-container {
        width: 100%;
        height: 15px;
        background: #dde1e7;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 14px;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        border-radius: 10px;
        background: linear-gradient(90deg, #1a73e8, #4fc3f7);
        transition: width 0.5s ease, background 0.4s ease;
      }

      .terminal-wrap { border-radius: 9px; overflow: hidden; border: 1px solid #d0d7de; box-shadow: 0 1px 4px rgba(0,0,0,0.06); background: #fff; }
      .terminal-bar { background: #eef2f6; padding: 6px 14px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #dce3ea; }
      .dot { width: 10px; height: 10px; border-radius: 50%; }
      .dot-r { background: #e88989; }
      .dot-y { background: #e7c27f; }
      .dot-g { background: #88c79b; }
      .terminal-label { margin-left: 6px; font-size: 11px; color: #5f6b7a; font-family: 'Courier New', monospace; }
      .terminal { background: #ffffff; color: #2f3a45; font-family: 'Courier New', Courier, monospace; font-size: 12px; padding: 14px 16px; height: 250px; overflow-y: auto; scroll-behavior: smooth; }
      .terminal p { margin: 1px 0; line-height: 1.6; }
      .log-error { color: #c62828; font-weight: bold; }
      .log-success { color: #2e7d32; font-weight: bold; }
      .log-info { color: #1565c0; font-weight: bold; }
      .log-warn { color: #ef6c00; font-weight: bold; }
    </style>
  </head>
  <body>

    <div class="header-container">
      <h2>Automated ETL Pipeline</h2>
      <div id="timer">Elapsed: 00:00</div>
    </div>
    
    <div class="controls">
      <div id="status-text">Scanning 01_Uploads folder...</div>
      <button id="stop-btn" class="stop-btn" onclick="stopQueue()">Stop Process</button>
    </div>

    <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
    <div class="terminal-wrap">
      <div class="terminal-bar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
        <span class="terminal-label">converter.log</span>
      </div>
      <div id="terminal" class="terminal">
        <p class="log-info">> System Initializing...</p>
      </div>
    </div>

    <script>
      let fileQueue = [];
      let currentIndex = 0;
      let successCount = 0;
      let errorCount = 0;
      let startTime, timerInterval;
      let isHalted = false; // The abort flag

      window.onload = function() {
        console.log("========================================");
        console.log("[CLIENT] Window loaded. Establishing connection to Google Servers...");
        google.script.run
          .withSuccessHandler(startQueue)
          .withFailureHandler(handleSystemError)
          .getPendingFiles();
      };

      // User clicked the STOP button
      function stopQueue() {
        console.warn("[CLIENT] User pressed the STOP button. Aborting pipeline...");
        isHalted = true;
        document.getElementById('stop-btn').disabled = true;
        document.getElementById('stop-btn').innerText = "Stopping...";
        logToTerminal("> ABORT COMMAND RECEIVED. Waiting for current file to finish...", "log-warn");
      }

      function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
          let elapsed = Math.floor((Date.now() - startTime) / 1000);
          let mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
          let secs = String(elapsed % 60).padStart(2, '0');
          document.getElementById('timer').innerText = `Elapsed: ${mins}:${secs}`;
        }, 1000);
      }
      function stopTimer() { clearInterval(timerInterval); }

      function startQueue(files) {
        console.log(`[CLIENT] Connection established. Received ${files.length} files from backend array.`);
        fileQueue = files;
        
        if (fileQueue.length === 0) {
          updateStatus("Folder is empty. No files to process.");
          logToTerminal("> 01_Uploads is empty. Operation complete.", "log-info");
          document.getElementById('stop-btn').disabled = true;
          return;
        }
        startTimer(); 
        updateStatus(`Found ${fileQueue.length} files. Starting processing...`);
        logToTerminal(`> Queued ${fileQueue.length} files. Beginning batch execution...`, "log-info");
        processNextFile();
      }

      function processNextFile() {
        // 1. Check if user pressed STOP
        if (isHalted) {
          console.warn("[CLIENT] Pipeline successfully halted by user.");
          finishQueue(true);
          return;
        }

        // 2. Check if we reached the end of the queue
        if (currentIndex >= fileQueue.length) {
          console.log("[CLIENT] Reached end of queue natively.");
          finishQueue(false);
          return;
        }

        let currentFile = fileQueue[currentIndex];
        console.log(`\n----------------------------------------`);
        console.log(`[CLIENT] Dispatched to Server: [${currentIndex + 1}/${fileQueue.length}] ${currentFile.name}`);
        console.log(`[CLIENT] Awaiting server response...`);
        
        logToTerminal(`> Processing (${currentIndex + 1}/${fileQueue.length}): ${currentFile.name}`, "log-info");
        updateStatus(`Processing file ${currentIndex + 1} of ${fileQueue.length}...`);

        google.script.run
          .withSuccessHandler(handleFileResult)
          .withFailureHandler(handleSystemError)
          .processSingleFile(currentFile);
      }

      function handleFileResult(response) {
        // Read the secret trace log from the server
        console.log(`[SERVER TELEMETRY FOR FILE ${currentIndex + 1}]:`);
        if (response.trace && response.trace.length > 0) {
          response.trace.forEach(step => console.log(`   ➔ ${step}`));
        } else {
          console.log(`   ➔ (No telemetry provided by server)`);
        }
        
        console.log(`[CLIENT] Server returned status Success = ${response.success}`);

        let cssClass = response.success ? "log-success" : "log-error";
        logToTerminal(response.log, cssClass);
        
        if (response.success) successCount++; else errorCount++;

        currentIndex++;
        let percentage = (currentIndex / fileQueue.length) * 100;
        document.getElementById('progress-bar').style.width = percentage + '%';

        processNextFile();
      }

      function finishQueue(wasHalted) {
        stopTimer(); 
        document.getElementById('stop-btn').disabled = true;
        
        if (wasHalted) {
          updateStatus(`Aborted! ${successCount} processed, ${fileQueue.length - currentIndex} skipped.`);
          logToTerminal(`> BATCH HALTED BY USER.`, "log-warn");
          document.getElementById('progress-bar').style.background = '#fab387';
        } else {
          updateStatus(`Complete! ${successCount} successful, ${errorCount} failed.`);
          logToTerminal(`> BATCH COMPLETE.`, "log-info");
          document.getElementById('progress-bar').style.background = 'linear-gradient(90deg, #34a853, #a6e3a1)';
        }
        console.log("========================================");
        console.log("[CLIENT] Session Ended.");
      }

      function updateStatus(msg) { document.getElementById('status-text').innerText = msg; }
      
      function logToTerminal(msg, className) {
        const terminal = document.getElementById('terminal');
        const p = document.createElement('p'); p.innerText = msg; if (className) p.className = className;
        terminal.appendChild(p); terminal.scrollTop = terminal.scrollHeight; 
      }

      function handleSystemError(err) {
        stopTimer();
        document.getElementById('stop-btn').disabled = true;
        console.error("[CRITICAL SYSTEM ERROR]", err);
        logToTerminal("> CRITICAL SYSTEM ERROR: " + err.message, "log-error");
        updateStatus("Process Halted Due to Error.");
      }
    </script>
  </body>
</html>
