<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
      .header-container { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
      h2 { margin: 0; font-size: 18px; color: #1a73e8; }
      #timer { font-size: 14px; font-weight: bold; color: #555; background: #e8eaed; padding: 4px 10px; border-radius: 4px; }

      .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      #status-text { font-weight: bold; font-size: 14px; }
      .stop-btn { background-color: #d32f2f; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
      .stop-btn:hover { background-color: #b71c1c; }
      .stop-btn:disabled { background-color: #e0e0e0; color: #9e9e9e; cursor: not-allowed; }

      .progress-container {
        width: 100%;
        height: 15px;
        background: #dde1e7;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 14px;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        border-radius: 10px;
        background: linear-gradient(90deg, #1a73e8, #4fc3f7);
        transition: width 0.5s ease, background 0.4s ease;
      }

      .terminal-wrap { border-radius: 9px; overflow: hidden; border: 1px solid #d0d7de; box-shadow: 0 1px 4px rgba(0,0,0,0.06); background: #fff; }
      .terminal-bar { background: #eef2f6; padding: 6px 14px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #dce3ea; }
      .dot { width: 10px; height: 10px; border-radius: 50%; }
      .dot-r { background: #e88989; }
      .dot-y { background: #e7c27f; }
      .dot-g { background: #88c79b; }
      .terminal-label { margin-left: 6px; font-size: 11px; color: #5f6b7a; font-family: 'Courier New', monospace; }
      .terminal { background: #ffffff; color: #2f3a45; font-family: 'Courier New', Courier, monospace; font-size: 12px; padding: 14px 16px; height: 250px; overflow-y: auto; scroll-behavior: smooth; }
      .terminal p { margin: 1px 0; line-height: 1.6; }

      .log-error   { color: #c62828; font-weight: bold; }
      .log-success { color: #2e7d32; font-weight: bold; }
      .log-info    { color: #1565c0; font-weight: bold; }
      .log-warn    { color: #ef6c00; font-weight: bold; }
    </style>
  </head>

  <body>

    <div class="header-container">
      <h2>Execute Stored Procedures</h2>
      <div id="timer">Elapsed: 00:00</div>
    </div>

    <div class="controls">
      <span id="status-text">Initializing pipeline...</span>
      <button id="stop-btn" class="stop-btn" onclick="stopPipeline()">Stop Process</button>
    </div>

    <div class="progress-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>

    <div class="terminal-wrap">
      <div class="terminal-bar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
        <span class="terminal-label">stored-procedures.log</span>
      </div>
      <div class="terminal" id="terminal">
        <p class="log-info">> Stored Procedures Pipeline initializing...</p>
      </div>
    </div>

    <script>
      let isHalted = false;
      let isRunning = false;
      let startTime, timerInterval;
      const TOTAL_STEPS = 3;

      window.onload = function () {
        startRun();
      };

      function startRun() {
        isRunning = true;
        startTimer();
        setStatus('Preparing stored procedures pipeline...');
        log('> Starting stored procedures pipeline...', 'log-info');
        log('> Step 1/' + TOTAL_STEPS + ': sp_build_export_pt', 'log-info');
        setProgress(0.05);

        google.script.run
          .withSuccessHandler(onStep1Completed)
          .withFailureHandler(onFatalError)
          .executeStoredProcedure(0);
      }

      function onStep1Completed(result) {
        isRunning = false;
        if (isHalted) return finish(true, false);

        log(result.log, result.success ? 'log-success' : 'log-error');
        if (!result.success) {
          return finish(false, true);
        }

        setStatus('Export PT complete. Starting RWA PQ...');
        log('> Step 2/' + TOTAL_STEPS + ': sp_build_rwa_pq', 'log-info');
        setProgress(0.35);
        isRunning = true;

        google.script.run
          .withSuccessHandler(onStep2Completed)
          .withFailureHandler(onFatalError)
          .executeStoredProcedure(1);
      }

      function onStep2Completed(result) {
        isRunning = false;
        if (isHalted) return finish(true, false);

        log(result.log, result.success ? 'log-success' : 'log-error');
        if (!result.success) {
          return finish(false, true);
        }

        setStatus('RWA PQ complete. Starting Aktionsplan INT PQ...');
        log('> Step 3/' + TOTAL_STEPS + ': sp_build_aktionsplan_int_pq', 'log-info');
        setProgress(0.68);
        isRunning = true;

        google.script.run
          .withSuccessHandler(onStep3Completed)
          .withFailureHandler(onFatalError)
          .executeStoredProcedure(2);
      }

      function onStep3Completed(result) {
        isRunning = false;
        if (isHalted) return finish(true, false);

        log(result.log, result.success ? 'log-success' : 'log-error');

        if (!result.success) {
          return finish(false, true);
        }

        setProgress(1.0);
        finish(false, false);
      }

      // ── Complete / abort ────────────────────────────────────────────────────
      function finish(wasHalted, hasError) {
        stopTimer();
        document.getElementById('stop-btn').disabled = true;

        if (wasHalted) {
          setStatus('Halted by user.');
          log('> PIPELINE HALTED BY USER.', 'log-warn');
          setProgressStyle('#fab387');
        } else if (hasError) {
          setStatus('Completed with errors — review the log above.');
          setProgressStyle('#f38ba8');
        } else {
          setStatus('Done! All stored procedures executed successfully.');
          log('> STORED PROCEDURES PIPELINE COMPLETE. ✔', 'log-success');
          setProgressStyle('linear-gradient(90deg, #34a853, #a6e3a1)');
        }
      }

      function stopPipeline() {
        isHalted = true;
        document.getElementById('stop-btn').disabled = true;
        document.getElementById('stop-btn').innerText = 'Stopping...';
        log('> ABORT SIGNAL RECEIVED — waiting for current procedure call to return...', 'log-warn');

        if (!isRunning) {
          finish(true, false);
        }
      }

      function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
          const s    = Math.floor((Date.now() - startTime) / 1000);
          const mins = String(Math.floor(s / 60)).padStart(2, '0');
          const secs = String(s % 60).padStart(2, '0');
          document.getElementById('timer').innerText = `Elapsed: ${mins}:${secs}`;
        }, 1000);
      }
      function stopTimer() { clearInterval(timerInterval); }

      function setStatus(msg) {
        document.getElementById('status-text').innerText = msg;
      }

      function setProgress(fraction) {
        document.getElementById('progress-bar').style.width = (Math.min(fraction, 1) * 100) + '%';
      }

      function setProgressStyle(bg) {
        const bar = document.getElementById('progress-bar');
        bar.style.background = bg;
      }

      function log(msg, css) {
        const terminal = document.getElementById('terminal');
        const p = document.createElement('p');
        p.innerText = msg;
        p.className = css || 'log-default';
        terminal.appendChild(p);
        terminal.scrollTop = terminal.scrollHeight;
      }

      function onFatalError(err) {
        stopTimer();
        document.getElementById('stop-btn').disabled = true;
        log('> FATAL ERROR: ' + err.message, 'log-error');
        setStatus('Pipeline failed — see log.');
        setProgressStyle('#f38ba8');
      }
    </script>

  </body>
</html>
