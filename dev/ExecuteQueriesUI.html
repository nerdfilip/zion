<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
      .header-container { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
      h2 { margin: 0; font-size: 18px; color: #1a73e8; }
      #timer { font-size: 14px; font-weight: bold; color: #555; background: #e8eaed; padding: 4px 10px; border-radius: 4px; }

      .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      #status-text { font-weight: bold; font-size: 14px; }
      .stop-btn { background-color: #d32f2f; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
      .stop-btn:hover { background-color: #b71c1c; }
      .stop-btn:disabled { background-color: #e0e0e0; color: #9e9e9e; cursor: not-allowed; }

      .progress-container {
        width: 100%;
        height: 15px;
        background: #dde1e7;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 14px;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        border-radius: 10px;
        background: linear-gradient(90deg, #1a73e8, #4fc3f7);
        transition: width 0.5s ease, background 0.4s ease;
      }

      .terminal-wrap { border-radius: 9px; overflow: hidden; border: 1px solid #d0d7de; box-shadow: 0 1px 4px rgba(0,0,0,0.06); background: #fff; }
      .terminal-bar { background: #eef2f6; padding: 6px 14px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #dce3ea; }
      .dot { width: 10px; height: 10px; border-radius: 50%; }
      .dot-r { background: #e88989; }
      .dot-y { background: #e7c27f; }
      .dot-g { background: #88c79b; }
      .terminal-label { margin-left: 6px; font-size: 11px; color: #5f6b7a; font-family: 'Courier New', monospace; }
      .terminal { background: #ffffff; color: #2f3a45; font-family: 'Courier New', Courier, monospace; font-size: 12px; padding: 14px 16px; height: 250px; overflow-y: auto; scroll-behavior: smooth; }
      .terminal p { margin: 1px 0; line-height: 1.6; }

      .log-error   { color: #c62828; font-weight: bold; }
      .log-success { color: #2e7d32; font-weight: bold; }
      .log-info    { color: #1565c0; font-weight: bold; }
      .log-warn    { color: #ef6c00; font-weight: bold; }
    </style>
  </head>

  <body>

    <div class="header-container">
      <h2>Execute Stored Procedures</h2>
      <div id="timer">Elapsed: 00:00</div>
    </div>

    <div class="controls">
      <span id="status-text">Initializing pipeline...</span>
      <button id="stop-btn" class="stop-btn" onclick="stopPipeline()">Stop Process</button>
    </div>

    <div class="progress-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>

    <div class="terminal-wrap">
      <div class="terminal-bar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
        <span class="terminal-label">stored-procedures.log</span>
      </div>
      <div class="terminal" id="terminal">
        <p class="log-info">> Stored Procedures Pipeline initializing...</p>
      </div>
    </div>

    <script>
      let isHalted = false;
      let isRunning = false;
      let startTime, timerInterval;
      let TOTAL_STEPS = 0;
      let PROCEDURE_LABELS = [];
      let PROCEDURE_NAMES = [];
      let COUNTRY_SHEETS = [];
      let INCLUDE_LEGACY_CONNECTED_SHEET_STEP = true;
      let pollTimer = null;
      let currentJob = null;
      let connectedJob = null;
      let pollInFlight = false;

      window.onload = function () {
        startRun();
      };

      function startRun() {
        isRunning = true;
        startTimer();
        setStatus('Preparing stored procedures pipeline and loading folder config...');
        log('> Starting stored procedures pipeline...', 'log-info');
        google.script.run
          .withSuccessHandler(onConfigLoaded)
          .withFailureHandler(onFatalError)
          .getExecuteQueriesConfig();
      }

      function onConfigLoaded(config) {
        if (isHalted) return finish(true, false);

        PROCEDURE_LABELS = config.procedureLabels || [];
        PROCEDURE_NAMES = config.procedureNames || [];
        COUNTRY_SHEETS = config.connectedSheetCountries || [];
        INCLUDE_LEGACY_CONNECTED_SHEET_STEP = config.includeLegacyConnectedSheetStep !== false;
        TOTAL_STEPS = (config.totalProcedures || 0) + COUNTRY_SHEETS.length + (INCLUDE_LEGACY_CONNECTED_SHEET_STEP ? 1 : 0);
        executeProcedureStep(0);
      }

      function executeProcedureStep(index) {
        isRunning = true;
        const stepNo = index + 1;
        const label = PROCEDURE_LABELS[index] || ('Procedure ' + stepNo);
        setStatus('Starting ' + label + '...');
        log('> Step ' + stepNo + '/' + TOTAL_STEPS + ': ' + label, 'log-info');
        setProgress(index / TOTAL_STEPS + 0.03);

        google.script.run
          .withSuccessHandler(function (result) { onProcedureStarted(index, result); })
          .withFailureHandler(onFatalError)
          .startStoredProcedure(index);
      }

      function onProcedureStarted(index, result) {
        if (isHalted) return finish(true, false);

        if (!result.success) {
          log(result.log, 'log-error');
          return finish(false, true);
        }

        log(result.log, 'log-info');
        currentJob = {
          index: index,
          jobId: result.jobId,
          location: result.location,
          polls: 0
        };

        startPollingCurrentProcedure();
      }

      function startPollingCurrentProcedure() {
        stopPollingCurrentProcedure();
        pollInFlight = false;
        pollTimer = setInterval(function () {
          if (isHalted || !currentJob || pollInFlight) return;

          pollInFlight = true;
          currentJob.polls += 1;
          google.script.run
            .withSuccessHandler(onProcedurePolled)
            .withFailureHandler(function (err) {
              pollInFlight = false;
              onFatalError(err);
            })
            .pollStoredProcedure(currentJob.index, currentJob.jobId, currentJob.location);
        }, 2000);
      }

      function stopPollingCurrentProcedure() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
        pollInFlight = false;
      }

      function onProcedurePolled(result) {
        pollInFlight = false;
        isRunning = false;
        if (isHalted) return finish(true, false);

        if (!result.success && result.done) {
          stopPollingCurrentProcedure();
          log(result.log, 'log-error');
          return finish(false, true);
        }

        if (!result.done) {
          setStatus('Running ' + PROCEDURE_LABELS[currentJob.index] + '...');
          return;
        }

        stopPollingCurrentProcedure();
        log(result.log, 'log-success');

        const completedSteps = currentJob.index + 1;
        setProgress(completedSteps / TOTAL_STEPS);

        const nextIndex = currentJob.index + 1;
        const completedProcName = PROCEDURE_NAMES[currentJob.index] || '';
        currentJob = null;

        if (INCLUDE_LEGACY_CONNECTED_SHEET_STEP && completedProcName === 'sp_lagerliste_komplett') {
          refreshLagerlisteKomplettConnectedSheet(nextIndex);
          return;
        }

        if (nextIndex < PROCEDURE_LABELS.length) {
          executeProcedureStep(nextIndex);
          return;
        }

        startConnectedSheetsCreation();
      }

      function refreshLagerlisteKomplettConnectedSheet(nextProcedureIndex) {
        const completedSteps = nextProcedureIndex;
        const stepNo = completedSteps + 1;
        setStatus('Refreshing Connected Sheet: Lagerliste Komplett...');
        log('> Step ' + stepNo + '/' + TOTAL_STEPS + ': Refresh Connected Sheet (Lagerliste Komplett)', 'log-info');
        setProgress(completedSteps / TOTAL_STEPS + 0.02);
        isRunning = true;

        google.script.run
          .withSuccessHandler(function (result) {
            onLagerlisteKomplettConnectedSheetRefreshed(result, nextProcedureIndex, stepNo);
          })
          .withFailureHandler(onFatalError)
          .createLagerlisteConnectedSheet();
      }

      function onLagerlisteKomplettConnectedSheetRefreshed(result, nextProcedureIndex, stepNo) {
        isRunning = false;
        if (isHalted) return finish(true, false);

        if (!result.success) {
          log(result.log, 'log-error');
          return finish(false, true);
        }

        log(result.log || '[SUCCESS] Connected Sheet refreshed: Lagerliste Komplett.', 'log-success');
        setProgress(stepNo / TOTAL_STEPS);

        if (nextProcedureIndex < PROCEDURE_LABELS.length) {
          executeProcedureStep(nextProcedureIndex);
          return;
        }

        startConnectedSheetsCreation();
      }

      function startConnectedSheetsCreation() {
        const stepNo = PROCEDURE_LABELS.length + (INCLUDE_LEGACY_CONNECTED_SHEET_STEP ? 1 : 0) + 1;
        setStatus('Creating Lagerliste_V3 Connected Sheets...');
        log('> Step ' + stepNo + '/' + TOTAL_STEPS + ': Start Connected Sheets document (Lagerliste_V3)', 'log-info');
        setProgress((stepNo - 1) / TOTAL_STEPS + 0.03);
        isRunning = true;

        google.script.run
          .withSuccessHandler(onConnectedSheetsStarted)
          .withFailureHandler(onFatalError)
          .startCreateLagerlisteV3ConnectedSheets();
      }

      function onConnectedSheetsStarted(result) {
        isRunning = false;
        if (isHalted) return finish(true, false);

        if (!result.success) {
          log(result.log, 'log-error');
          return finish(false, true);
        }

        connectedJob = {
          operationId: result.operationId,
          totalTables: result.totalTables || COUNTRY_SHEETS.length,
          spreadsheetUrl: result.spreadsheetUrl || ''
        };

        log(result.log, 'log-info');
        if (connectedJob.spreadsheetUrl) {
          log('[INFO] Output spreadsheet: ' + connectedJob.spreadsheetUrl, 'log-info');
        }

        startConnectedSheetsPolling();
      }

      function startConnectedSheetsPolling() {
        stopPollingCurrentProcedure();
        pollInFlight = false;
        pollTimer = setInterval(function () {
          if (isHalted || !connectedJob || pollInFlight) return;

          pollInFlight = true;
          isRunning = true;
          google.script.run
            .withSuccessHandler(onConnectedSheetsPolled)
            .withFailureHandler(function (err) {
              pollInFlight = false;
              onFatalError(err);
            })
            .pollCreateLagerlisteV3ConnectedSheets(connectedJob.operationId);
        }, 2000);
      }

      function onConnectedSheetsPolled(result) {
        pollInFlight = false;
        isRunning = false;
        if (isHalted) return finish(true, false);

        if (!result.success && result.done) {
          stopPollingCurrentProcedure();
          log(result.log, 'log-error');
          return finish(false, true);
        }

        if (!result.done) {
          if (result.log) {
            log(result.log, 'log-success');
          }
          setStatus('Creating Connected Sheets in Lagerliste_V3 (' + result.completedTables + '/' + result.totalTables + ')...');
          setProgress((PROCEDURE_LABELS.length + (INCLUDE_LEGACY_CONNECTED_SHEET_STEP ? 1 : 0) + result.completedTables) / TOTAL_STEPS);
          return;
        }

        stopPollingCurrentProcedure();
        if (result.log) {
          log(result.log, 'log-success');
        }
        if (result.spreadsheetUrl) {
          log('[SUCCESS] Lagerliste_V3 ready: ' + result.spreadsheetUrl, 'log-success');
        }
        setProgress(1.0);
        finish(false, false);
      }

      // ── Complete / abort ────────────────────────────────────────────────────
      function finish(wasHalted, hasError) {
        stopTimer();
        document.getElementById('stop-btn').disabled = true;

        if (wasHalted) {
          setStatus('Halted by user.');
          log('> PIPELINE HALTED BY USER.', 'log-warn');
          setProgressStyle('#fab387');
        } else if (hasError) {
          setStatus('Completed with errors - review the log below.');
          setProgressStyle('#f38ba8');
        } else {
          setStatus('Done! Stored procedures and Connected Sheets completed successfully.');
          log('> EXECUTE QUERIES PIPELINE COMPLETE', 'log-success');
          setProgressStyle('linear-gradient(90deg, #34a853, #a6e3a1)');
        }
      }

      function stopPipeline() {
        isHalted = true;
        stopPollingCurrentProcedure();
        document.getElementById('stop-btn').disabled = true;
        document.getElementById('stop-btn').innerText = 'Stopping...';
        log('> ABORT SIGNAL RECEIVED — waiting for current procedure call to return...', 'log-warn');

        if (!isRunning) {
          finish(true, false);
        }
      }

      function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
          const s    = Math.floor((Date.now() - startTime) / 1000);
          const mins = String(Math.floor(s / 60)).padStart(2, '0');
          const secs = String(s % 60).padStart(2, '0');
          document.getElementById('timer').innerText = `Elapsed: ${mins}:${secs}`;
        }, 1000);
      }
      function stopTimer() { clearInterval(timerInterval); }

      function setStatus(msg) {
        document.getElementById('status-text').innerText = msg;
      }

      function setProgress(fraction) {
        document.getElementById('progress-bar').style.width = (Math.min(fraction, 1) * 100) + '%';
      }

      function setProgressStyle(bg) {
        const bar = document.getElementById('progress-bar');
        bar.style.background = bg;
      }

      function log(msg, css) {
        const terminal = document.getElementById('terminal');
        const p = document.createElement('p');
        p.innerText = msg;
        p.className = css || 'log-default';
        terminal.appendChild(p);
        terminal.scrollTop = terminal.scrollHeight;
      }

      function onFatalError(err) {
        stopPollingCurrentProcedure();
        stopTimer();
        document.getElementById('stop-btn').disabled = true;
        log('> FATAL ERROR: ' + err.message, 'log-error');
        setStatus('Pipeline failed — see log.');
        setProgressStyle('#f38ba8');
      }
    </script>

  </body>
</html>
